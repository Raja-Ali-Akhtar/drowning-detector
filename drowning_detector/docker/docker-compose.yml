# ============================================================
# Drowning Detection System — Docker Compose
# Usage:
#   docker-compose up --build          # CPU mode
#   docker-compose --profile gpu up    # GPU mode (requires nvidia-docker)
# ============================================================

services:
  # ── API Service ──────────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: drowning_detector/docker/Dockerfile
    container_name: drowning-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://drowning:drowning_pass@postgres:5432/drowning_db
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
    volumes:
      - model-weights:/app/models
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - drowning-net

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: drowning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: drowning
      POSTGRES_PASSWORD: drowning_pass
      POSTGRES_DB: drowning_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drowning"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drowning-net

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: drowning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - drowning-net

  # ── Prometheus (monitoring) ──────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: drowning-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - drowning-net

  # ── Grafana (dashboards) ─────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: drowning-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - drowning-net

volumes:
  postgres-data:
  redis-data:
  model-weights:
  prometheus-data:
  grafana-data:

networks:
  drowning-net:
    driver: bridge
